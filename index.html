<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Student Registration Form</h2>

    <form id="studentForm">

        <label>First Name <span>*</span></label>
        <input type="text" id="fname">

        <label>Last Name <span>*</span></label>
        <input type="text" id="lname">

        <label>Student ID <span>*</span></label>
        <input type="text" id="studentId" placeholder="23-54050-3">

        <label>Email <span>*</span></label>
        <input type="text" id="email" placeholder="abc@student.aiub.edu">

        <label>Credit Completed <span>*</span></label>
        <input type="number" id="credit">

        <label>Department <span>*</span></label>
        <select id="department">
            <option value="">--Select Department--</option>
            <option>CSE</option>
            <option>CS</option>
            <option>EEE</option>
            <option>IPE</option>
            <option>BBA</option>
        </select>

        <div class="btn">
            <button type="submit">Register</button>
        </div>

    </form>
</div>

<div class="list-container">
    <h2>Registered Students</h2>

    <table id="studentTable">
        <thead>
            <tr>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Student ID</th>
                <th>Email</th>
                <th>Credit</th>
                <th>Department</th>
            </tr>
        </thead>

        <tbody>

        </tbody>
    </table>
</div>

<script src="script.js"></script>

</body>
</html>
